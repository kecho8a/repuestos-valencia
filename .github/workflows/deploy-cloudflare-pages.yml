name: Deploy to Cloudflare Pages

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ main ]

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Validate Cloudflare secrets
        run: |
          if [ -z "${{ secrets.CF_PAGES_API_TOKEN }}" ] || [ -z "${{ secrets.CF_ACCOUNT_ID }}" ] || [ -z "${{ secrets.CF_PROJECT_NAME }}" ]; then
            echo "ERROR: Cloudflare secrets are missing. Set CF_PAGES_API_TOKEN, CF_ACCOUNT_ID, and CF_PROJECT_NAME in repository secrets."
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CF_PAGES_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          projectName: ${{ secrets.CF_PROJECT_NAME }}
          directory: ./dist

# Notes:
# - Create the repository secrets: CF_PAGES_API_TOKEN, CF_ACCOUNT_ID, CF_PROJECT_NAME.
# - Alternatively, connect the repo directly in the Cloudflare Pages dashboard and
#   set the build command to `npm run build` and the output directory to `dist`.
